name: Smoke Test (Released Action)

on:
  workflow_dispatch:
    inputs:
      run:
        description: 'workflow run'
        required: true
        default: 'true'
  workflow_run:
    workflows: ["Create release"]
    types:
      - completed

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test (${{ matrix.format }}, root=${{ matrix.include_root }})
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        format: [zip, tar, tgz, tbz2]
        include_root: [true, false]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Test Files
        run: |
          mkdir -p testdir/subdir
          echo "Hello World" > testdir/file.txt
          echo "Nested file" > testdir/subdir/nested.txt

      - name: Compress
        id: compress
        uses: somaz94/compress-decompress@v1
        with:
          command: 'compress'
          source: './testdir'
          format: ${{ matrix.format }}
          includeRoot: ${{ matrix.include_root }}
          verbose: 'true'

      - name: Set Archive Path
        id: archive
        run: |
          if [ "${{ matrix.include_root }}" = "true" ]; then
            echo "path=./testdir.${{ matrix.format }}" >> $GITHUB_OUTPUT
          else
            echo "path=./testdir/testdir.${{ matrix.format }}" >> $GITHUB_OUTPUT
          fi

      - name: Verify Archive Created
        run: |
          if [ ! -f "${{ steps.archive.outputs.path }}" ]; then
            echo "❌ Archive not found: ${{ steps.archive.outputs.path }}"
            exit 1
          fi
          echo "✅ Archive created: ${{ steps.archive.outputs.path }}"

      - name: Decompress
        uses: somaz94/compress-decompress@v1
        with:
          command: 'decompress'
          source: ${{ steps.archive.outputs.path }}
          format: ${{ matrix.format }}
          dest: './extracted'

      - name: Verify Extraction
        run: |
          if [ "${{ matrix.include_root }}" = "true" ]; then
            EXPECTED="./extracted/testdir/file.txt"
          else
            EXPECTED="./extracted/file.txt"
          fi

          if [ -f "$EXPECTED" ]; then
            echo "✅ Decompression verified: $EXPECTED"
          else
            echo "❌ Expected file not found: $EXPECTED"
            echo "Actual contents:"
            find ./extracted -type f | sort
            exit 1
          fi
